backend:
  name: github
  repo: Moutaz-Code/Moutaz-Code.github.io
  branch: main
  base_url: https://moutaz-code-github-io.vercel.app
  auth_endpoint: /api/auth

site_url: https://moutaz-code-github-io.vercel.app

# Cloudinary media library (client-side config)
# cloud_name and api_key are OK here. Never include api_secret.
media_libraries:
  cloudinary:
    config:
      cloud_name: dnal0wnob
      api_key: 845452482314754

# Keep these for legacy/local uploads if needed,
# but once Cloudinary is working you can consider removing local folders
# or leaving them as fallback.
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: projects
    label: Projects
    folder: src/content/projects
    extension: mdx
    format: frontmatter
    create: true
    slug: "{{slug}}"

    # Legacy local folders (optional to keep during transition)
    media_folder: public/uploads/projects
    public_folder: /uploads/projects

    fields:
      - { name: title, label: Title, widget: string }
      - { name: summary, label: Summary, widget: text }

      - name: tags
        label: Tags
        widget: list
        default: []

      - name: status
        label: Status
        widget: select
        options:
          - { label: Ongoing, value: ongoing }
          - { label: Completed, value: completed }
        default: ongoing

      - { name: featured, label: Featured, widget: boolean, default: false }

      - { name: dateStart, label: Start Date, widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { name: dateEnd, label: End Date, widget: datetime, required: false, date_format: "YYYY-MM-DD", time_format: false }

      - name: links
        label: Links
        widget: list
        default: []
        fields:
          - { name: label, label: Label, widget: string }
          - { name: url, label: URL, widget: string }

      - name: media
        label: Media
        widget: list
        default: []
        fields:
          - name: type
            label: Type
            widget: select
            options:
              - { label: Image, value: image }
              - { label: GIF, value: gif }
              - { label: Video, value: video }
              - { label: Embed, value: embed }
            default: image

          # When Cloudinary is enabled, Sveltia should insert Cloudinary URLs here.
          - { name: src, label: Source, widget: image }

          - { name: alt, label: Alt Text, widget: string, required: false }
          - { name: caption, label: Caption, widget: string, required: false }

      # Case study fields (all optional)
      - { name: role, label: Role, widget: string, required: false, hint: "Your role, e.g. 'Solo developer' or 'Frontend lead'" }
      - { name: timeframe, label: Timeframe, widget: string, required: false, hint: "e.g. Oct 2025 – Present" }

      - name: stack
        label: Tech Stack
        widget: list
        default: []
        hint: "Technologies used (separate from browsing tags)"

      - name: highlights
        label: Highlights
        widget: list
        default: []
        hint: "3–6 key bullet points summarizing the project"

      - name: results
        label: Results
        widget: list
        default: []
        hint: "Measurable or concrete outcomes"

      - { name: problem, label: Problem, widget: text, required: false, hint: "What problem does this project solve?" }

      - name: constraints
        label: Constraints
        widget: list
        default: []

      - name: approach
        label: Approach
        widget: list
        default: []

      - name: architecture
        label: Architecture
        widget: list
        default: []

      - name: challenges
        label: Challenges
        widget: list
        default: []

      - name: lessons
        label: Lessons Learned
        widget: list
        default: []

      - name: nextSteps
        label: Next Steps
        widget: list
        default: []

      - { name: body, label: Body, widget: markdown }

  - name: posts
    label: Posts
    folder: src/content/posts
    extension: mdx
    format: frontmatter
    create: true
    slug: "{{slug}}"

    # Legacy local folders (optional to keep during transition)
    media_folder: public/uploads/posts
    public_folder: /uploads/posts

    fields:
      - { name: title, label: Title, widget: string }
      - { name: excerpt, label: Excerpt, widget: text }

      - name: tags
        label: Tags
        widget: list
        default: []

      - { name: publishedAt, label: Published Date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }

      # When Cloudinary is enabled, Sveltia should insert a Cloudinary URL here.
      - { name: coverImage, label: Cover Image, widget: image, required: false }

      - { name: body, label: Body, widget: markdown }